# /etc/hermes/webui.conf
# Configuration for Hermes Web UI

# Address and Port to bind to
# For local access only: 127.0.0.1. To expose to LAN, set to 0.0.0.0
HERMES_WEBUI_HOST="127.0.0.1"
HERMES_WEBUI_PORT="8787"

# State directory for session history and settings
HERMES_WEBUI_STATE_DIR="/var/lib/hermes-webui"

# Hermes home directory (agent state, config, logs)
HERMES_HOME="/var/lib/hermes-webui"

# Gateway connection settings
# The WebUI connects to the gateway daemon for cron/scheduler ticks
HERMES_WEBUI_GATEWAY_BASE_URL="http://127.0.0.1:8642"

# Workspace settings
# WebUI workspace path (mounted directory for file access and git operations)
# HERMES_WEBUI_WORKSPACE_PATH="/var/lib/hermes-webui/workspace"

# Workspace Git support (read-only by default)
# Set HERMES_WEBUI_WORKSPACE_GIT_DESTRUCTIVE=1 to enable:
#   stage/unstage, commit, push/pull, checkout, branch switching
# HERMES_WEBUI_WORKSPACE_GIT_DESTRUCTIVE="1"

# TLS Configuration (Optional)
# HERMES_WEBUI_TLS_CERT=""
# HERMES_WEBUI_TLS_KEY=""

# Optional password for Web UI authentication
# HERMES_WEBUI_PASSWORD=""
